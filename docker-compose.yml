version: "3.9"

services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend0:
    build: ./fastApi
    container_name: serverFastApi
    restart: always
    ports:
      - "8001:8000"

  backend:
      build: ./notionservice
      container_name: server
      depends_on:
        - db
      ports:
        - "8000:8080"
      environment:
        DATABASE_NAME: mydb
        DATABASE_USER: admin
        DATABASE_PASSWORD: secret

  frontend:
    build: ./notion.client
    container_name: react_app
    restart: always
    ports:
      - "3000:5002"
    depends_on:
      - backend

volumes:
  postgres_data: