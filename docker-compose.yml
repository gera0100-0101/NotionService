version: "3.9"

services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./fastApi
    container_name: backend
    restart: always
    ports:
      - "8001:8000"

  frontend:
    build: ./notion.client
    container_name: react_app
    restart: always
    ports:
      - "3000:5002"
    depends_on:
      - backend

volumes:
  postgres_data: